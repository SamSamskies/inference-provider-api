<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Allow inference?</title>
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="approval.css" />
  </head>
  <body class="approval-body">
    <main class="approval">
      <div class="approval-scroll stack">
        <header>
          <div class="eyebrow">Permission request</div>
          <h1>Allow inference?</h1>
          <p class="hint">
            This site wants to send a chat request through your IPA Demo extension.
          </p>
        </header>

        <section class="panel stack">
          <h2>Origin</h2>
          <div class="origin" id="origin">…</div>
        </section>

        <section class="panel stack">
          <h2>Provider / model</h2>
          <label class="field">
            <span>OpenAI model</span>
            <select id="model"></select>
          </label>
        </section>

        <section class="panel stack preview-panel">
          <h2>Request preview</h2>
          <div class="preview" id="preview" aria-live="polite"></div>
        </section>

        <p class="status err" id="error" hidden></p>
      </div>

      <div class="approval-footer">
        <label class="remember">
          <input type="checkbox" id="remember" />
          <span>Remember for this site</span>
        </label>
        <p class="hint remember-hint" id="rememberHint">
          Allow once, or deny only this request.
        </p>
        <div class="actions approval-actions">
          <button type="button" class="primary" id="allow">Allow</button>
          <button type="button" class="danger" id="deny">Deny</button>
        </div>
      </div>
    </main>
    <script type="module" src="approval.js"></script>
  </body>
</html>
